services:
  postgres:
    image: postgres:16-alpine
    container_name: meowpay-postgres
    environment:
      POSTGRES_DB: meowpay
      POSTGRES_USER: meowpay
      POSTGRES_PASSWORD: meowpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
